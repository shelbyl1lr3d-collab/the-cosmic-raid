<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-bind="title">The Cosmic Raid</title>
  <style>
    :root { --primary: #4fc3f7; --secondary: #ff3333; --bg: #000a1a; --accent: #ffeb3b; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:#eee; font-family:monospace; text-align:center; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
    #header { padding:8px; background:rgba(0,0,0,0.5); }
    h1 { color:var(--primary); font-size:20px; }
    #score { color:var(--primary); font-size:28px; font-weight:bold; }
    #canvas-wrap { flex:1; display:flex; justify-content:center; align-items:center; }
    canvas { border:2px solid var(--primary); background:#000; max-width:100%; max-height:100%; }
    #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; justify-content:center; align-items:center; flex-direction:column; }
    #overlay h2 { color:var(--primary); font-size:36px; }
    .btn { background:var(--primary); color:#000; padding:12px 32px; border:none; font-size:18px; font-weight:bold; border-radius:8px; cursor:pointer; margin:10px; }
    #token-badge { background:var(--secondary); color:#000; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:bold; display:inline-block; }
  </style>
</head>
<body>
  <div id="header">
    <h1 data-bind="title">The Cosmic Raid</h1>
    <div><span id="token-badge">TCR</span></div>
    <div id="score">0</div>
  </div>
  <div id="canvas-wrap"><canvas id="g" width="400" height="500"></canvas></div>
  <div id="overlay">
    <h2>GAME OVER</h2>
    <p style="color:#eee;font-size:20px;margin:15px;">Score: <span id="final-score">0</span></p>
    <button class="btn" onclick="restartGame()">PLAY AGAIN</button>
  </div>
  <script>
    const THEME = { primary: '#4fc3f7', secondary: '#ff3333', bg: '#000a1a', accent: '#ffeb3b' };
    const TOKEN = 'TCR';
    const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');
    const W = 400, H = 500, SIZE = 20, COLS = Math.floor(W/SIZE), ROWS = Math.floor(H/SIZE);
    let snake, dir, nextDir, food, score, running, gameOver, frame;

    function init() {
      snake = [{x:Math.floor(COLS/2), y:Math.floor(ROWS/2)}];
      dir = {x:1, y:0}; nextDir = {x:1, y:0};
      food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
      score = 0; running = false; gameOver = false; frame = 0;
      document.getElementById('score').innerText = '0';
    }

    document.addEventListener('keydown', e => {
      if (!running && !gameOver) { running = true; document.getElementById('overlay').style.display='none'; }
      switch(e.key) {
        case 'ArrowUp': if (dir.y!==1) nextDir={x:0,y:-1}; break;
        case 'ArrowDown': if (dir.y!==-1) nextDir={x:0,y:1}; break;
        case 'ArrowLeft': if (dir.x!==1) nextDir={x:-1,y:0}; break;
        case 'ArrowRight': if (dir.x!==-1) nextDir={x:1,y:0}; break;
      }
    });

    function update() {
      if (!running || gameOver) return;
      frame++; if (frame%8!==0) return;
      dir = {...nextDir};
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { die(); return; }
      for (let s of snake) { if (s.x === head.x && s.y === head.y) { die(); return; } }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10; document.getElementById('score').innerText = score;
        food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
      } else { snake.pop(); }
    }

    function die() { gameOver=true; running=false; document.getElementById('final-score').innerText=score; document.getElementById('overlay').style.display='flex'; }
    function restartGame() { init(); document.getElementById('overlay').style.display='none'; running=true; }
    function draw() {
      ctx.fillStyle = '#111'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = THEME.primary; snake.forEach(s => ctx.fillRect(s.x*SIZE, s.y*SIZE, SIZE-1, SIZE-1));
      ctx.fillStyle = THEME.secondary; ctx.fillRect(food.x*SIZE, food.y*SIZE, SIZE-1, SIZE-1);
    }
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    init(); loop();
  </script>
</body>
</html>
